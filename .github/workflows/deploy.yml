name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        env:
          SSH_KEY: ${{ secrets.XSERVER_SSH_KEY }}
          HOST: ${{ secrets.XSERVER_HOST }}
          USER: ${{ secrets.XSERVER_USER }}
          DEPLOY_PATH: ${{ secrets.XSERVER_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 10022 "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -p 10022 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            ./ "${USER}@${HOST}:${DEPLOY_PATH}"
